# Full local stack in containers, behind nginx for trusted HTTPS on :443.
#   1. node build.mjs                                     # build the bundles the images copy
#   2. ./infra/nginx/gen-certs.sh                         # once: TLS cert for *.drop.localhost
#   3. docker compose -f infra/docker-compose.yml up --build
#   -> https://api.drop.localhost/        control plane + dashboard + /docs
#   -> https://<name>.drop.localhost/     published sites (wildcard -> edge)
# Rootless host (can't bind :443)?  DROP_HTTPS_PORT=8443 docker compose ... up --build
# Metadata lives in Postgres; file bytes in Floci (S3-compatible). The api migrates
# Postgres on boot; the edge connects read-only. nginx mirrors the prod ingress.
services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    environment:
      POSTGRES_USER: drop
      POSTGRES_PASSWORD: drop
      POSTGRES_DB: drop
    volumes:
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drop -d drop"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  floci:
    # Floci — S3-compatible emulator (https://floci.io). Holds the served file bytes.
    image: docker.io/floci/floci:latest
    environment:
      FLOCI_STORAGE_MODE: hybrid
    volumes:
      - floci-data:/app/data
    ports:
      - "4566:4566"

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      floci:
        condition: service_started
    # Optionally load the repo .env (Google OAuth creds, etc.) when present — lets the
    # dev-auth stack do real Google login. Safe to miss on a fresh clone.
    env_file:
      - path: ../.env
        required: false
    environment:
      DROP_HTTP_PORT: "8080"
      DROP_BASE_DOMAIN: "drop.localhost"
      DROP_DATABASE_URL: "postgres://drop:drop@postgres:5432/drop"
      DROP_S3_BUCKET: "drop-sites"
      DROP_S3_ENDPOINT: "http://floci:4566"
      DROP_S3_REGION: "us-east-1"
      DROP_S3_KEY_ID: "test"
      DROP_S3_SECRET: "test"
      DROP_DEV_AUTH: "1"
      # Use the image's baked CA bundle (any infra/ca/*.crt) — override any
      # host-specific NODE_EXTRA_CA_CERTS path that .env might carry.
      NODE_EXTRA_CA_CERTS: "/usr/local/share/drop-ca-bundle.pem"
    ports:
      - "8473:8080"

  edge:
    build:
      context: ..
      dockerfile: infra/Dockerfile.edge
    depends_on:
      postgres:
        condition: service_healthy
      floci:
        condition: service_started
    environment:
      DROP_HTTP_PORT: "8080"
      DROP_BASE_DOMAIN: "drop.localhost"
      DROP_DATABASE_URL: "postgres://drop:drop@postgres:5432/drop"
      DROP_S3_BUCKET: "drop-sites"
      DROP_S3_ENDPOINT: "http://floci:4566"
      DROP_S3_REGION: "us-east-1"
      DROP_S3_KEY_ID: "test"
      DROP_S3_SECRET: "test"
      DROP_EDGE_DISK_CACHE: "/cache"
    volumes:
      - edge-cache:/cache
    ports:
      - "8474:8080"

  nginx:
    # Local HTTPS reverse proxy — trusted certs + stable names; mirrors prod ingress.
    # Run ./infra/nginx/gen-certs.sh first to populate ./nginx/certs.
    image: docker.io/library/nginx:1.27-alpine
    depends_on:
      - api
      - edge
    volumes:
      - ./nginx/drop.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      # Defaults to 443; set DROP_HTTPS_PORT (e.g. 8443) when the host can't bind
      # privileged ports (rootless Docker/Podman) or 443 is taken.
      - "${DROP_HTTPS_PORT:-443}:443"

volumes:
  pg-data:
  floci-data:
  edge-cache:
