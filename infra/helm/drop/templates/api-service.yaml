apiVersion: v1
kind: Service
metadata:
  name: {{ include "drop.fullname" . }}-api
  labels:
    {{- include "drop.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    # Per-target-group health check for the AWS Load Balancer Controller (the api
    # answers on /healthz). Ignored by non-ALB ingress controllers.
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "drop.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
