apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drop.fullname" . }}-api
  labels:
    {{- include "drop.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "drop.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "drop.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "drop.serviceAccountName" . }}
      containers:
        - name: api
          image: {{ include "drop.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/api.js"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "drop.fullname" . }}-config
          env:
            - name: DROP_DEV_AUTH
              value: "0"
            - name: DROP_GOOGLE_CLIENT_ID
              value: {{ .Values.googleClientId | quote }}
            {{- /* (J2) OIDC client id — falls back to DROP_GOOGLE_CLIENT_ID when empty. */}}
            {{- with .Values.oidcClientId }}
            - name: DROP_OIDC_CLIENT_ID
              value: {{ . | quote }}
            {{- end }}
            - name: DROP_PUBLIC_URL
              value: {{ include "drop.publicUrl" . | quote }}
            - name: DROP_ALLOWED_EMAILS
              value: {{ .Values.config.allowedEmails | quote }}
            - name: DROP_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "drop.secretName" . }}
                  key: {{ .Values.secret.googleClientSecretKey }}
            {{- /* (J2) OIDC client secret + break-glass admin — optional keys. optional:true means a
                   Secret lacking them leaves the env unset, so the DROP_GOOGLE_* fallback still applies
                   and a Google-only deployment is unaffected. */}}
            - name: DROP_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "drop.secretName" . }}
                  key: {{ .Values.secret.oidcClientSecretKey }}
                  optional: true
            - name: DROP_BREAK_GLASS_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "drop.secretName" . }}
                  key: {{ .Values.secret.breakGlassAdminKey }}
                  optional: true
            - name: DROP_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "drop.secretName" . }}
                  key: {{ .Values.secret.sessionSecretKey }}
            - name: DROP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "drop.secretName" . }}
                  key: {{ .Values.secret.databaseUrlKey }}
            {{- if .Values.compute.enabled }}
            # Compute plane ON: reach the cluster via the pod ServiceAccount (RBAC in rbac.yaml).
            - name: DROP_KUBECONFIG
              value: "in-cluster"
            - name: DROP_SECRET_BACKEND
              value: {{ .Values.compute.secretBackend | quote }}
            - name: DROP_IMAGE_BACKEND
              value: {{ .Values.compute.imageBackend | quote }}
            {{- with .Values.compute.imageRegistry }}
            - name: DROP_IMAGE_REGISTRY
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.compute.imageRegistryPullSecret }}
            - name: DROP_IMAGE_REGISTRY_PULL_SECRET
              value: {{ . | quote }}
            {{- end }}
            - name: DROP_BLOCKED_EGRESS_CIDRS
              value: {{ .Values.compute.blockedEgressCidrs | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
