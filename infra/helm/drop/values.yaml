# Single image with both bundles; command is overridden per Deployment.
image:
  repository: REPLACE_ME.dkr.ecr.us-east-1.amazonaws.com/drop
  tag: "" # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# DNS
baseDomain: drop.example.com # sites served at *.baseDomain
apiHost: api.drop.example.com # control plane + dashboard + OAuth callback

# Non-secret config (rendered into a ConfigMap / pod env).
config:
  s3Bucket: drop-sites
  s3Region: us-east-1
  allowedDomains: "example.com" # comma-separated; empty = any Google account
  allowedEmails: "" # optional per-person allowlist, comma-separated
  admins: "" # comma-separated emails seeded as platform admins on API boot
  publicUrl: "" # default https://{apiHost}; its /auth/callback is the OAuth redirect

googleClientId: "" # not secret → ConfigMap/env

# Postgres holds all metadata (sites, members, versions, users, auth handles).
# Use an EXTERNAL managed database (RDS / CloudSQL / company DB) — the chart does
# not bundle one (backups/HA are the platform's responsibility). The API runs
# migrations on boot under an advisory lock (multi-replica safe); the edge is
# read-only and does not migrate.
secret:
  existingSecret: "" # name of a Secret holding the keys below
  googleClientSecretKey: DROP_GOOGLE_CLIENT_SECRET
  sessionSecretKey: DROP_SESSION_SECRET
  databaseUrlKey: DROP_DATABASE_URL
  create: false
  googleClientSecret: ""
  sessionSecret: "" # generate: openssl rand -hex 32
  databaseUrl: "" # postgres://user:pass@host:5432/drop

# S3 auth is via the pod's IAM role (IRSA) — no access keys. Put the role ARN here.
serviceAccount:
  create: true
  name: ""
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/drop-s3

api:
  replicaCount: 2
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { memory: 256Mi }
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

edge:
  replicaCount: 2
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { memory: 256Mi }
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  # Asset cache on ephemeral node-local disk (emptyDir). It's just a cache — S3 is
  # the source of truth — so it needs no persistence and no sharing: per-pod +
  # ephemeral is exactly right, and it scales to any replica count. A new/restarted
  # pod re-warms from S3. Memory holds only the version pointer.
  diskCache:
    enabled: true
    mountPath: /cache
    sizeBytes: 5368709120 # app LRU cap → DROP_EDGE_DISK_CACHE_BYTES (5 GiB)
    sizeLimit: 6Gi # emptyDir node-disk cap (a little above sizeBytes)

ingress:
  enabled: true
  className: "" # e.g. "nginx" or "alb"
  annotations: {}
  # nginx example: cert-manager.io/cluster-issuer, etc.
  # ALB example: alb.ingress.kubernetes.io/certificate-arn, scheme: internal, ...
  # WebSockets (A1): the ALB idle timeout defaults to 60s and will drop quiet WS sockets
  # (the edge's own idle timeout is 5m — DROP_WS_IDLE_TIMEOUT_MS — so the LB is the tighter
  # bound). Raise it on the ALB so long-lived connections survive lulls:
  #   alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600
  # (A2's NLB removes the concern — 350s and truly transparent.)
  tls:
    enabled: true
    secretName: "" # wildcard cert Secret (nginx). For ALB, use ACM via annotations.

# Load-balancer topology (Plan-v5 A2 "LB topology — two shapes, recommended migration path").
#   dual  — RECOMMENDED step-1 default: keep the existing ALB for HTTPS, add a SEPARATE internal NLB
#           for the L4/TCP plane (edge-tcp). Zero churn to the HTTP plane; L4 ships independently.
#   nlb   — step-2 consolidation end-state: the TCP plane's NLB is provisioned; moving :443 onto an
#           NLB TLS listener is a manual follow-up, not automated here.
#   alb   — HTTP-only, NO L4 plane (the edge-tcp Service falls back to ClusterIP).
lb:
  mode: dual # alb | nlb | dual

# L4 / TCP plane (A2) — the in-cluster edge-tcp router that gives raw-TCP workloads (psql, Redis,
# MQTT, …) a path via TLS-SNI on a shared port or a dedicated port from the dynamic pool. OFF by
# default (opt-in). `drop expose` / the expose API turn it on per workload; the API patches this
# Service's published-port list as dynamic ports are allocated/released.
tcp:
  enabled: false
  replicaCount: 2
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { memory: 128Mi }
  # Well-known shared ports (SNI / PG-preamble routing) — one listener fronts MANY SNI-routable
  # workloads. protocol: postgres (libpq SSLRequest preamble) | tls-sni (peek the ClientHello directly).
  sharedPorts:
    - { port: 5432, protocol: postgres }
  # The dynamic per-workload port pool the API allocates from (lowest-free wins) for `--port` exposure.
  portRange: "7000-7099"
  # Persistent dynamic-port listeners to always publish on the Service — usually empty: the API grows
  # the list on expose. Pin ports here only if you don't want the API to own them across `helm upgrade`.
  dynamicPorts: []

nameOverride: ""
fullnameOverride: ""
podAnnotations: {}

# Compute plane — container apps + managed databases + write-only app secrets.
# OFF by default → Drop is STATIC-SITES-ONLY (the same feature set as the ECS/Fargate deploy):
# /v1/apps, /v1/databases and the secret routes return 501. Turn this ON for the full PaaS on
# Kubernetes: it sets DROP_KUBECONFIG=in-cluster (the API talks to the cluster via its pod
# ServiceAccount) and grants that SA the RBAC to manage tenant namespaces + workloads.
#
# REQUIRES the cluster operators to be installed separately (the eks/ Terraform does this; locally
# infra/local/compute-up.sh does): KEDA + the KEDA HTTP add-on, CloudNativePG + the Barman Cloud
# Plugin, External Secrets Operator (only for secretBackend: aws), and a `gvisor` RuntimeClass.
compute:
  enabled: false
  secretBackend: kube # "kube" (k8s Secrets, no extra deps) or "aws" (AWS Secrets Manager via ESO)
  imageBackend: registry # "registry" (push to ECR — the prod default) or "containerd"
  imageRegistry: "" # <acct>.dkr.ecr.<region>.amazonaws.com/drop-apps  (required when imageBackend=registry)
  imageRegistryPullSecret: "" # name of a pre-provisioned imagePullSecret in tenant namespaces (optional; ECR-via-IRSA needs none)
  blockedEgressCidrs: "" # pod+service CIDRs excluded from the tenant HTTPS egress allowlist — REQUIRED on EKS (e.g. "10.0.0.0/8,172.20.0.0/16")
