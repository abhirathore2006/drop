# Drop local HTTPS reverse proxy — mirrors the production ingress.
#   api.drop.localhost   -> api  (control plane, dashboard, /docs, login, /v1)
#   *.drop.localhost     -> edge (published sites; routed by Host / X-Forwarded-Host)
# TLS terminates here on :443; the edge reads X-Forwarded-Host so the site name survives.

map $http_upgrade $connection_upgrade { default upgrade; "" close; }

# Control plane — exact host wins over the wildcard below.
server {
  listen 443 ssl;
  http2 on;
  server_name api.drop.localhost;

  ssl_certificate     /etc/nginx/certs/drop.localhost.pem;
  ssl_certificate_key /etc/nginx/certs/drop.localhost-key.pem;
  client_max_body_size 200m;            # room for large publishes

  location / {
    proxy_pass http://api:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

# Every other *.drop.localhost -> the edge (which routes by the forwarded host).
server {
  listen 443 ssl default_server;
  http2 on;
  server_name ~^.+\.drop\.localhost$;

  ssl_certificate     /etc/nginx/certs/drop.localhost.pem;
  ssl_certificate_key /etc/nginx/certs/drop.localhost-key.pem;

  location / {
    proxy_pass http://edge:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $remote_addr;
    # WebSockets: forward the Upgrade/Connection handshake so the edge's upgrade path can
    # tunnel WS to type=app workloads (A1). $connection_upgrade maps to "close" for non-WS.
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
