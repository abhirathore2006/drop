# Full nginx.conf for LOCAL L4 (TCP) parity — the A2 stream plane.
#
# WHY a whole nginx.conf and not a conf.d snippet: nginx's `stream {}` is a TOP-LEVEL context
# (a sibling of `http {}`), so it CANNOT live in conf.d (which is included inside `http {}`).
# The Makefile `tls` target mounts this file at /etc/nginx/nginx.conf — but ONLY when invoked
# with TCP_PORTS=1 (default OFF; see the Makefile comment — port 5432 is occupied on most dev
# machines, including this one, by local Postgres).
#
# The HTTP plane is UNCHANGED: `http {}` below just `include`s the same conf.d/default.conf (the
# templated infra/nginx/drop.conf) the default target already mounts — single source of truth.
# The `stream {}` block is the only L4 addition: it forwards the shared protocol port(s) and the
# dynamic range to the host-side `edge-tcp` router, which does the REAL routing (SNI extraction,
# libpq SSLRequest preamble, per-workload cap). nginx here is a dumb L4 forwarder to edge-tcp.
#
# The Makefile substitutes the EDGE-TCP-HOST / EDGE-TCP-PORT placeholders (host gateway + the
# host port edge-tcp serves the shared SNI/Postgres path on) and expands the DYNAMIC-SERVERS
# marker below into one `server { listen N; proxy_pass HOST:N; }` per port in the dynamic range.

worker_processes  1;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  # api.<domain> → api, *.<domain> → edge — the exact HTTP config the default target mounts.
  include       /etc/nginx/conf.d/*.conf;
}

# L4 plane — raw TCP, no HTTP parsing.
stream {
  # ssl_preread reads the TLS SNI WITHOUT terminating TLS. Locally there is ONE edge-tcp
  # upstream, so the map is trivial (in prod the NLB + a real map fan out by SNI). edge-tcp
  # re-extracts the SNI itself; this map only chooses the backend.
  map $ssl_preread_server_name $tcp_backend {
    default __EDGE_TCP_HOST__:__EDGE_TCP_PORT__;
  }

  # Shared protocol port (Postgres 5432 by default). Postgres sends an 8-byte cleartext
  # SSLRequest BEFORE any TLS, so ssl_preread finds no ClientHello in the first packet and just
  # forwards the bytes verbatim — edge-tcp answers the preamble ('S') and peeks the SNI in the
  # ClientHello that follows. A pure TLS-SNI protocol (Redis-TLS, …) would be SNI-routed here.
  server {
    listen 5432;
    ssl_preread on;
    proxy_pass $tcp_backend;
  }

  # Dynamic per-workload ports — plain TCP forward, no SNI (non-TLS protocols). edge-tcp routes
  # by the port number alone. NOTE: locally, edge-tcp must be reachable at HOST:<port> for each
  # of these; running edge-tcp on the same host that publishes these ports needs them free (the
  # full local end-to-end wiring, incl. the edge-tcp process + Service, lands with A2b).
__DYNAMIC_SERVERS__
}
