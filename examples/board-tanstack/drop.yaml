# Deploy with:  drop deploy examples/board-tanstack
# Full walkthrough (create the DB + map these env vars):  examples/DATABASE_APPS.md
app:
  name: board
  # Built locally and imported into k3s (see the guide). NOT a :latest tag, so k8s uses the
  # imported image instead of trying to pull from a registry.
  image: board-tanstack:1
  services:
    - internal_port: 8080 # matches PORT=8080 baked into the image
  scale:
    min: 1 # TanStack Start has a cold start; min: 1 keeps it warm. Use 0 for scale-to-zero.
    max: 2
  resources:
    cpu: "500m"
    memory: "512Mi" # the SSR node server wants a little more than the plain Node app
  env:
    # --- non-secret DB connection config (safe to commit) ---
    PGHOST: board-db-rw # the `-rw` Service of the DB you create with `drop db create board-db`
    PGPORT: "5432"
    PGUSER: app # CNPG's application role
    PGDATABASE: app # CNPG's application database
    PGSSLMODE: require # encrypt in transit (CNPG self-signed cert; the app does not verify it)
  # PGPASSWORD is NOT here — it is a SECRET (never committed). After deploying, set it write-only:
  #   drop db password board-db                       # prints the password once
  #   printf '<that password>' | drop secrets set board PGPASSWORD --stdin
  #   drop restart board                              # apply it
  # Secrets are stored in the secret manager and injected as env vars — see ../DATABASE_APPS.md.
