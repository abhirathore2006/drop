# Deploy with:  drop deploy examples/notes-next --build --no-start   (walkthrough: ../DATABASE_APPS.md)
# Full walkthrough (create the DB + map these env vars):  examples/DATABASE_APPS.md
app:
  name: notes
  # Built locally and imported into k3s (see the guide). NOT a :latest tag.
  image: notes-next:1
  services:
    - internal_port: 8080 # matches PORT=8080 baked into the image
  scale:
    min: 1 # Next has a cold start; min: 1 keeps it warm. Use 0 for scale-to-zero.
    max: 2
  resources:
    cpu: "500m"
    memory: "512Mi" # Next needs a little more than the Node app
  env:
    # --- non-secret DB connection config (safe to commit) ---
    PGHOST: notes-db-rw # the `-rw` Service of the DB you create with `drop db create notes-db`
    PGPORT: "5432"
    PGUSER: app
    PGDATABASE: app
    PGSSLMODE: require
  # PGPASSWORD is NOT here — it is a SECRET (never committed). Deploy with --no-start, then rotate the DB password straight into this secret and start the app:
  #   drop db password notes-db --set-secret notes:PGPASSWORD   # rotate + store; never printed
  #   drop start notes   # first boot, already has the password
  # Secrets are stored in the secret manager and injected as env vars — see ../DATABASE_APPS.md.

# --- The SAME notes app, as a STACK (B2). One command provisions the database AND the app and wires the
# app→database edge:  drop up examples/notes-next
# This is additive — the `app:` section above still works with `drop deploy`. The stack creates a database
# `notes-db` (key `db` → `<stack>-<key>`) and an app `notes-web`, building the image from this folder's
# Dockerfile. `uses: [{ database: db }]` injects the CNPG `notes-db-app` secret + CA + PGSSLMODE=verify-full.
# Set PGPASSWORD after `up`:  drop db password notes-db --set-secret notes-web:PGPASSWORD && drop restart notes-web
stack:
  name: notes
  resources:
    db:
      type: database
      storage: 1Gi
    web:
      type: app
      dir: . # build context → built + pushed through Drop at `up`
      uses: [{ database: db }] # app→database edge; `db` resolves to the site name `notes-db`
      scale: { min: 1, max: 2 }
      resources: { cpu: "500m", memory: "512Mi" }
      env:
        PGHOST: notes-db-rw # the `-rw` Service of the `db` resource (materialized as `notes-db`)
        PGPORT: "5432"
        PGUSER: app
        PGDATABASE: app
        # PGSSLMODE is set to verify-full by the `uses` binding (with the mounted CA); PGPASSWORD is a
        # write-only secret set after `up` (see the comment above).
